{% extends "base.html" %}

{% block title %}Create Team{% endblock %}

{% block content %}
<div class="section-header">
    <div>
        <h1 class="page-title" style="margin:0;">Create Team</h1>
        <p class="page-subtitle" style="margin:0.35rem 0 0;">Spin up a squad with its own ticket prefix — like Jira project keys.</p>
    </div>
    <a href="{{ url_for('teams.list_teams') }}" class="btn btn-secondary">← Back to teams</a>
</div>

<div class="card" style="max-width:640px;">
    <form method="POST" action="{{ url_for('teams.create_team') }}">
        <div class="form-group">
            <label class="form-label">Team name *</label>
            <input type="text" name="name" required class="form-input" placeholder="Platform SRE">
        </div>
        <div class="form-group">
            <label class="form-label">Project key *</label>
            <input type="text" name="project_key" required maxlength="10" class="form-input" placeholder="SRE" style="text-transform:uppercase;">
            <p class="share-hint">2–10 letters/numbers. Tickets become SRE-1, SRE-2, …</p>
        </div>
        <div class="form-group">
            <label class="form-label">Description</label>
            <textarea name="description" rows="3" class="form-textarea" placeholder="What this team owns…"></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Create Team</button>
    </form>
</div>
{% endblock %}
