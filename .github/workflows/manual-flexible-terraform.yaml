name: Terraform manual

on:
  workflow_dispatch:
    inputs:
      terraform_path:
        type: choice
        required: true
        # default: day9-ecs-terraform/infra
        choices:
          - day9-ecs-terraform/infra
          - day9-ecs-terraform/modules/ecs
      
      terraform_version:
        type: choice
        required: true
        # default: 1.12.1
        choices:
          - 1.12.1
          - 1.13.0
          - 1.14.0
          - 1.15.0
          - 1.16.0

      plan_or_apply_or_destroy:
        type: choice
        required: true
        # default: plan
        choices:
          - plan
          - apply
          - destroy


env:
  AWS_REGION: ap-south-1


jobs:
  terraform-apply:
    runs-on: ubuntu-latest
    steps:  
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Install Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ inputs.terraform_version }}
      - name: Initialize Terraform
        run: |
          cd ${{ inputs.terraform_path }}
          terraform init
      - name: Apply Terraform
        working-directory: ${{ inputs.terraform_path }}
        run: |
          terraform ${{ inputs.plan_or_apply_or_destroy }} -auto-approve