# ============================================================
#  Nginx config for: static.demo.livingdevops.org
#  Purpose        : Serve a static site over HTTPS
#  SSL Provider   : Let's Encrypt (via Certbot)
# ============================================================


# ────────────────────────────────────────────────────────────
#  SERVER BLOCK 1 — HTTP (port 80)
#  Catches all plain HTTP traffic and redirects it to HTTPS.
#  The only exception is the ACME challenge path, which
#  Certbot uses to prove domain ownership when issuing /
#  renewing the SSL certificate.
# ────────────────────────────────────────────────────────────
server {
    # Listen on port 80 for IPv4 and IPv6
    listen 80;
    listen [::]:80;

    # The domain this block responds to
    server_name static.demo.livingdevops.org;

    # Let Certbot write its challenge files here during cert
    # issuance / renewal. Must NOT be redirected to HTTPS.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Send everything else to HTTPS with a permanent (301) redirect.
    # $host preserves the domain, $request_uri preserves the path + query.
    location / {
        return 301 https://$host$request_uri;
    }
}


# ────────────────────────────────────────────────────────────
#  SERVER BLOCK 2 — HTTPS (port 443)
#  The real server. Handles all encrypted traffic.
# ────────────────────────────────────────────────────────────
server {
    # Listen on port 443 (standard HTTPS) for IPv4 and IPv6
    listen 443 ssl;
    listen [::]:443 ssl;

    # Enable HTTP/2 — multiplexed requests, faster page loads
    http2 on;

    # The domain this block owns
    server_name static.demo.livingdevops.org;


    # ── SSL CERTIFICATES ──────────────────────────────────────
    # Certbot writes these files after a successful cert issuance.
    # fullchain.pem = your cert + intermediate CA certs (send both to clients)
    # privkey.pem   = your private key (keep this secret, never expose it)
    # chain.pem     = intermediate CA only (used for OCSP stapling below)
    ssl_certificate     /etc/letsencrypt/live/static.demo.livingdevops.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/static.demo.livingdevops.org/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/static.demo.livingdevops.org/chain.pem;


    # ── TLS PROTOCOL & CIPHER HARDENING ──────────────────────
    # Only allow TLS 1.2 and 1.3. Older versions (SSLv3, TLS 1.0/1.1)
    # have known vulnerabilities (POODLE, BEAST) and are disabled.
    ssl_protocols TLSv1.2 TLSv1.3;

    # Ordered list of strong cipher suites. These provide forward
    # secrecy (ECDHE) so past sessions can't be decrypted if the
    # private key is ever compromised.
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;

    # 'off' means let the CLIENT pick the cipher from the list above.
    # Modern clients choose well, so this is the recommended setting.
    ssl_prefer_server_ciphers off;

    # Cache SSL session parameters for 10 minutes so returning visitors
    # skip the full TLS handshake (faster reconnects).
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Disable TLS session tickets — they can weaken forward secrecy
    # if the ticket key is compromised.
    ssl_session_tickets off;

    # OCSP Stapling: Nginx fetches the certificate revocation status
    # from the CA and "staples" it to the handshake, so browsers don't
    # have to make a separate OCSP request (faster + more private).
    ssl_stapling        on;
    ssl_stapling_verify on;

    # DNS resolvers Nginx uses to look up the OCSP responder address.
    # Using Cloudflare (1.1.1.1) and Google (8.8.8.8) as fallback.
    resolver         1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;


    # ── SECURITY RESPONSE HEADERS ─────────────────────────────
    # These headers are sent with every response to harden the browser.

    # HSTS: Tell browsers to ONLY use HTTPS for this domain for 2 years.
    # includeSubDomains covers *.livingdevops.org as well.
    # preload allows submission to browser HSTS preload lists.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Prevent this site from being embedded in an <iframe> on other domains.
    # Protects against clickjacking attacks.
    add_header X-Frame-Options DENY always;

    # Stop browsers from guessing (sniffing) the content type of a response.
    # Prevents MIME-type confusion attacks.
    add_header X-Content-Type-Options nosniff always;

    # Controls how much referrer info is sent when navigating away.
    # 'strict-origin-when-cross-origin' sends full path within same origin,
    # only the domain to cross-origin HTTPS destinations, nothing to HTTP.
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Restricts which browser features this page can use.
    # Blocks geolocation, camera, and microphone APIs entirely.
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;

    # Content Security Policy: whitelist where scripts, styles, images, etc.
    # can be loaded from. Tweak src values if you use a CDN or external fonts.
    # 'unsafe-inline' for styles is common for static sites without a build step.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; object-src 'none'; frame-ancestors 'none';" always;


    # ── DOCUMENT ROOT ─────────────────────────────────────────
    # Where your static files live on disk. Nginx serves files from here.
    root  /var/www/static.demo.livingdevops.org;

    # Default files to serve when a directory is requested (e.g. GET /)
    index index.html index.htm;


    # ── LOGGING ───────────────────────────────────────────────
    # Separate log files per domain — makes debugging much easier
    # when multiple sites run on the same server.
    # 'combined' format logs: IP, time, method, path, status, bytes, referrer, UA
    access_log /var/log/nginx/static.demo.livingdevops.org.access.log combined;

    # 'warn' level means only warnings and above are logged (not info/debug noise)
    error_log  /var/log/nginx/static.demo.livingdevops.org.error.log warn;


    # ── GZIP COMPRESSION ──────────────────────────────────────
    # Compress responses before sending them. Reduces bandwidth and
    # speeds up page loads — especially for text-heavy assets.

    # Turn gzip on
    gzip on;

    # Add 'Vary: Accept-Encoding' header so CDNs/proxies cache
    # compressed and uncompressed versions separately
    gzip_vary on;

    # Compress responses for proxied requests too (e.g. behind a load balancer)
    gzip_proxied any;

    # Compression level 1–9. Level 6 is a good balance of CPU vs savings.
    gzip_comp_level 6;

    # File types to compress. Don't gzip already-compressed formats
    # like .jpg, .png, .zip — they won't shrink and waste CPU.
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/rss+xml
        application/atom+xml
        image/svg+xml;


    # ── STATIC ASSET CACHING ──────────────────────────────────
    # Tell browsers to cache these file types for 30 days.
    # Good for images, fonts, CSS, JS that don't change often.
    # If you update a file, change its filename/hash to bust the cache.
    location ~* \.(ico|css|js|gif|jpeg|jpg|png|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires    30d;

        # 'public' = any cache (browser, CDN) can store it.
        # 'no-transform' = don't let proxies alter the content (e.g. re-compress images).
        add_header Cache-Control "public, no-transform";

        # Skip logging for static assets — they're noisy and rarely useful
        access_log off;
    }


    # ── MAIN LOCATION BLOCK ───────────────────────────────────
    # Handles all requests not matched by a more specific block above.
    location / {
        # try_files checks for:
        #   $uri        — exact file match (e.g. /about.html)
        #   $uri/       — directory with an index file
        #   =404        — return 404 if neither found (don't fall through silently)
        try_files $uri $uri/ =404;
    }


    # ── BLOCK HIDDEN FILES ────────────────────────────────────
    # Deny access to any file or directory starting with a dot.
    # Prevents accidental exposure of .git, .env, .htpasswd, etc.
    location ~ /\. {
        deny all;
        return 404;
    }


    # ── CUSTOM ERROR PAGES (optional) ────────────────────────
    # Point error codes to friendly HTML pages in your document root.
    # Create /var/www/static.demo.livingdevops.org/404.html etc.
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
}