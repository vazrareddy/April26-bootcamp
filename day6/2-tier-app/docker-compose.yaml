services:
  postgres:
    networks:
      - app-network
    image: postgres:13
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydb
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    build:
      context: .
    ports:
      - 8000:8000
    depends_on:
      postgres:
        condition: service_healthy
        restart: true

    networks:
      - app-network
    environment:
      DB_LINK: postgresql://postgres:password@postgres:5432/mydb
    command: python run.py

volumes:
  postgres_data:

networks:
  app-network:

    driver: bridge